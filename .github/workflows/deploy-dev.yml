name: Deploy dev with Docker Compose

on:
  push:
    branches: [dev]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image (dev)
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: yang0709/journal-backend:dev

      - name: Upload deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.dev.yml"
          target: "/opt/journal-dev"
          strip_components: 0
          overwrite: true

      - name: Deploy to server with Docker Compose (dev)
        uses: appleboy/ssh-action@v1.0.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            sudo docker --version
            sudo docker compose version
            cd /opt/journal-dev
            cat > .env <<EOF
            JWT_SECRET=${{ secrets.JWT_SECRET_DEV }}
            WX_APPID=${{ secrets.WX_APPID }}
            WX_SECRET=${{ secrets.WX_SECRET }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            SENSITIVE_WORDS_KEY=${{ secrets.SENSITIVE_WORDS_KEY }}
            NODE_ENV=development
            LOG_LEVEL=info
            LOG_MAX_SIZE=5m
            LOG_MAX_FILES=7d
            COS_SECRET_ID=${{ secrets.COS_SECRET_ID }}
            COS_SECRET_KEY=${{ secrets.COS_SECRET_KEY }}
            COS_BUCKET=${{ secrets.COS_BUCKET }}
            COS_REGION=${{ secrets.COS_REGION }}
            COS_PUBLIC_DOMAIN=${{ secrets.COS_PUBLIC_DOMAIN }}
            COS_UPLOAD_DIR=journal
            COS_STS_DURATION_SECONDS=1800
            COS_MAX_FILE_SIZE_MB=10
            UPLOAD_DAILY_BASE_LIMIT=15
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            DEEPSEEK_API_BASE=https://api.deepseek.com
            DEEPSEEK_MODEL=deepseek-chat
            AI_DAILY_BASE_LIMIT=5
            ADMIN_JWT_SECRET=${{ secrets.ADMIN_JWT_SECRET }}
            ADMIN_JWT_EXPIRES_IN=7d
            ADMIN_BOOTSTRAP_USERNAME=${{ secrets.ADMIN_BOOTSTRAP_USERNAME }}
            ADMIN_BOOTSTRAP_PASSWORD=${{ secrets.ADMIN_BOOTSTRAP_PASSWORD }}
            EOF
            sudo docker pull yang0709/journal-backend:dev
            sudo docker compose -f docker-compose.dev.yml down
            sudo docker compose -f docker-compose.dev.yml up --force-recreate -d
            sudo docker image prune -f